on:
  workflow_dispatch:
  push:
    tags:
     - 'v[0-9]+.[0-9]+.[0-9]+\+?*'

name: Create Release Draft

jobs:
  create-release-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
